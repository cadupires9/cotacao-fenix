<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Compras · Cadu</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Figtree:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111210;
  --surface: #1a1b18;
  --surface2: #222320;
  --surface3: #2a2b28;
  --border: #333431;
  --border2: #3d3e3a;
  --text: #e8e6e0;
  --muted: #5a5a54;
  --muted2: #3f3f3a;
  --orange: #e07b2a;
  --orange-dim: rgba(224,123,42,0.12);
  --orange-glow: rgba(224,123,42,0.06);
  --green: #4a9e6e;
  --green-dim: rgba(74,158,110,0.12);
  --red: #c44030;
  --red-dim: rgba(196,64,48,0.1);
  --yellow: #c8960a;
  --yellow-dim: rgba(200,150,10,0.12);
  --blue: #4a7ec4;
  --font: 'Figtree', sans-serif;
  --display: 'Bebas Neue', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; display: flex; flex-direction: column; }

/* TOPBAR */
.topbar {
  height: 48px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 20px;
  flex-shrink: 0;
  z-index: 100;
}
.topbar-logo { font-family: var(--display); font-size: 22px; letter-spacing: 0.04em; line-height: 1; }
.topbar-logo em { color: var(--orange); font-style: normal; }
.topbar-divider { width: 1px; height: 24px; background: var(--border); }
.topbar-stat { display: flex; flex-direction: column; gap: 1px; }
.topbar-stat-label { font-family: var(--mono); font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
.topbar-stat-val { font-family: var(--mono); font-size: 13px; }
.topbar-stat-val.orange { color: var(--orange); }
.topbar-stat-val.green { color: var(--green); }
.topbar-spacer { flex: 1; }
.topbar-time { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.topbar-btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 0 14px;
  height: 30px;
  border-radius: 5px;
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all 0.12s;
  display: flex; align-items: center; gap: 6px;
}
.topbar-btn:hover { border-color: var(--orange); color: var(--orange); }
.pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

/* WORKSPACE */
.workspace { flex: 1; display: grid; grid-template-columns: 200px 1fr 300px; overflow: hidden; }

/* SIDEBAR */
.sidebar-left {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto;
  padding: 16px 0;
}
.sidebar-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); padding: 0 16px; margin-bottom: 6px; }
.nav-item {
  width: 100%; background: none; border: none; color: var(--muted);
  padding: 8px 16px; text-align: left; cursor: pointer;
  font-family: var(--font); font-size: 13px;
  display: flex; align-items: center; gap: 9px;
  transition: all 0.1s;
  border-left: 2px solid transparent;
}
.nav-item:hover { color: var(--text); background: var(--surface2); }
.nav-item.active { color: var(--text); background: var(--orange-glow); border-left-color: var(--nav-color, var(--orange)); }
.nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.nav-count { margin-left: auto; font-family: var(--mono); font-size: 10px; background: var(--surface3); color: var(--orange); padding: 1px 6px; border-radius: 3px; min-width: 20px; text-align: center; }
.nav-count.zero { color: var(--muted); }
.sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

/* LISTA */
.sol-list { overflow-y: auto; border-right: 1px solid var(--border); background: var(--bg); }
.sol-list-header {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--bg); z-index: 10;
}
.sol-list-title { font-family: var(--display); font-size: 18px; letter-spacing: 0.03em; line-height: 1; }
.sol-list-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

.sol-item {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}
.sol-item::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--item-color, transparent); opacity: 0; transition: opacity 0.15s;
}
.sol-item:hover { background: var(--surface); }
.sol-item:hover::before { opacity: 0.6; }
.sol-item.selected { background: var(--surface2); }
.sol-item.selected::before { opacity: 1; }
.sol-item-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.sol-item-loja { display: flex; align-items: center; gap: 7px; font-weight: 600; font-size: 14px; }
.sol-item-id { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.sol-item-meta { display: flex; justify-content: space-between; align-items: center; }
.sol-item-data { font-size: 11px; color: var(--muted); font-family: var(--mono); }
.pill { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 7px; border-radius: 3px; }
.pill-enviada { background: rgba(74,126,196,0.15); color: var(--blue); }
.pill-aprovada { background: var(--green-dim); color: var(--green); }
.pill-rascunho { background: var(--surface3); color: var(--muted); }
.sol-item-progress { margin-top: 8px; height: 2px; background: var(--surface3); border-radius: 1px; overflow: hidden; }
.sol-item-progress-bar { height: 100%; border-radius: 1px; transition: width 0.3s; }

/* DETALHE */
.detail-panel { background: var(--surface); overflow-y: auto; display: flex; flex-direction: column; }
.detail-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 12px; padding: 40px; text-align: center; }
.detail-empty-icon { font-size: 36px; opacity: 0.4; }
.detail-empty-txt { font-size: 12px; line-height: 1.5; }

.detail-header { padding: 16px 18px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.detail-loja-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.detail-loja-nome { font-family: var(--display); font-size: 20px; letter-spacing: 0.03em; line-height: 1; }
.detail-id { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.detail-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }

.detail-financeiro { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.fin-cell { background: var(--surface2); padding: 10px 16px; }
.fin-label { font-family: var(--mono); font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
.fin-val { font-family: var(--mono); font-size: 15px; }
.fin-val.green { color: var(--green); }

.detail-actions { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; }
.act-btn { flex: 1; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 8px 0; border-radius: 5px; font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; transition: all 0.12s; }
.act-btn.green-btn { border-color: rgba(74,158,110,0.4); color: var(--green); }
.act-btn.green-btn:hover { background: var(--green-dim); border-color: var(--green); }
.act-btn.orange-btn { background: var(--orange); border-color: var(--orange); color: white; }
.act-btn.orange-btn:hover { opacity: 0.85; }
.act-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.detail-items { flex: 1; overflow-y: auto; }

.item-row { padding: 12px 16px; border-bottom: 1px solid var(--border); transition: background 0.1s; }
.item-row:hover { background: var(--surface2); }
.item-row.aprovado { border-left: 2px solid var(--green); }
.item-row.negado { border-left: 2px solid var(--red); opacity: 0.5; }
.item-row.ajustado { border-left: 2px solid var(--yellow); }

.item-row-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.item-nome { font-weight: 600; font-size: 13px; }
.item-cat-tag { font-family: var(--mono); font-size: 9px; color: var(--muted); background: var(--surface3); padding: 2px 6px; border-radius: 3px; margin-top: 3px; }
.item-status-badge { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.05em; padding: 3px 7px; border-radius: 3px; flex-shrink: 0; }
.isb-pendente { background: var(--surface3); color: var(--muted); }
.isb-aprovado { background: var(--green-dim); color: var(--green); }
.isb-negado { background: var(--red-dim); color: var(--red); }
.isb-ajustado { background: var(--yellow-dim); color: var(--yellow); }

.item-fornecedor { font-size: 11px; color: var(--muted); margin-bottom: 7px; }
.item-row-nums { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 9px; }
.num-label { font-family: var(--mono); font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
.num-val { font-family: var(--mono); font-size: 12px; }
.num-val.price { color: var(--orange); }
.num-val.stock { color: var(--muted); }

.item-row-actions { display: flex; gap: 6px; align-items: center; }
.qtd-aprov-input { background: var(--surface3); border: 1px solid var(--border2); color: var(--text); padding: 5px 8px; border-radius: 4px; font-family: var(--mono); font-size: 12px; width: 64px; text-align: center; outline: none; transition: border-color 0.12s; }
.qtd-aprov-input:focus { border-color: var(--orange); }
.micro-btn { background: none; border: 1px solid var(--border2); color: var(--muted); padding: 5px 10px; border-radius: 4px; font-family: var(--mono); font-size: 10px; cursor: pointer; transition: all 0.12s; white-space: nowrap; }
.micro-btn.aprov { border-color: rgba(74,158,110,0.35); color: var(--green); }
.micro-btn.aprov:hover, .micro-btn.aprov.on { background: var(--green-dim); border-color: var(--green); }
.micro-btn.negar { border-color: rgba(196,64,48,0.3); color: var(--red); }
.micro-btn.negar:hover, .micro-btn.negar.on { background: var(--red-dim); border-color: var(--red); }

.detail-total { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface2); flex-shrink: 0; }
.detail-total-row { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.detail-total-row.main { font-size: 14px; color: var(--orange); }

.list-empty { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 12px; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 10px 18px; border-radius: 6px; font-family: var(--mono); font-size: 11px; z-index: 999; opacity: 0; transition: all 0.2s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok { border-color: var(--green); color: var(--green); }
.toast.err { border-color: var(--red); color: var(--red); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">PAINEL <em>COMPRAS</em></div>
  <div class="topbar-divider"></div>
  <div class="topbar-stat">
    <div class="topbar-stat-label">Pendentes</div>
    <div class="topbar-stat-val orange" id="stat-pendentes">—</div>
  </div>
  <div class="topbar-stat">
    <div class="topbar-stat-label">Aprovadas hoje</div>
    <div class="topbar-stat-val green" id="stat-aprovadas">—</div>
  </div>
  <div class="topbar-stat">
    <div class="topbar-stat-label">Total aprovado</div>
    <div class="topbar-stat-val" id="stat-total">—</div>
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-time" id="topbar-time"></div>
  <button class="topbar-btn" onclick="carregarTudo()"><div class="pulse-dot"></div> Atualizar</button>
</div>

<div class="workspace">

  <nav class="sidebar-left">
    <div style="margin-bottom:20px">
      <div class="sidebar-label">Lojas</div>
      <button class="nav-item active" style="--nav-color:var(--orange)" onclick="filtrarLoja(null,this)">
        <div class="nav-dot" style="background:var(--muted)"></div>Todas
        <span class="nav-count" id="nc-todas">0</span>
      </button>
      <button class="nav-item" style="--nav-color:#e07b2a" onclick="filtrarLoja('Super Fênix',this)">
        <div class="nav-dot" style="background:#e07b2a"></div>Super Fênix
        <span class="nav-count" id="nc-sf">0</span>
      </button>
      <button class="nav-item" style="--nav-color:#c8960a" onclick="filtrarLoja('Fênix 219',this)">
        <div class="nav-dot" style="background:#c8960a"></div>Fênix 219
        <span class="nav-count" id="nc-219">0</span>
      </button>
      <button class="nav-item" style="--nav-color:#4a9e6e" onclick="filtrarLoja('Nova Fênix',this)">
        <div class="nav-dot" style="background:#4a9e6e"></div>Nova Fênix
        <span class="nav-count" id="nc-nf">0</span>
      </button>
      <button class="nav-item" style="--nav-color:#4a7ec4" onclick="filtrarLoja('Acácia',this)">
        <div class="nav-dot" style="background:#4a7ec4"></div>Acácia
        <span class="nav-count" id="nc-ac">0</span>
      </button>
    </div>
    <hr class="sidebar-divider">
    <div>
      <div class="sidebar-label">Status</div>
      <button class="nav-item active" id="fs-enviada" style="--nav-color:var(--blue)" onclick="filtrarStatus('enviada',this)">
        <div class="nav-dot" style="background:var(--blue)"></div>Aguardando
      </button>
      <button class="nav-item" id="fs-aprovada" style="--nav-color:var(--green)" onclick="filtrarStatus('aprovada',this)">
        <div class="nav-dot" style="background:var(--green)"></div>Aprovadas
      </button>
      <button class="nav-item" id="fs-todas" style="--nav-color:var(--muted)" onclick="filtrarStatus('todas',this)">
        <div class="nav-dot" style="background:var(--muted)"></div>Todas
      </button>
    </div>
  </nav>

  <div class="sol-list">
    <div class="sol-list-header">
      <div>
        <div class="sol-list-title" id="list-titulo">AGUARDANDO</div>
        <div class="sol-list-sub" id="list-sub">Solicitações dos gerentes</div>
      </div>
    </div>
    <div id="sol-list-body"><div class="list-empty">Carregando...</div></div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-empty">
      <div class="detail-empty-icon">←</div>
      <div class="detail-empty-txt">Selecione uma solicitação<br>para ver os detalhes</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://ccdlreblkvgnidtwinkz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_fUFSIIZ0L8BXehhezAFQ6A_fsQ0b9pv';
const LOJA_CORES = { 'Super Fênix':'#e07b2a','Fênix 219':'#c8960a','Nova Fênix':'#4a9e6e','Acácia':'#4a7ec4' };

let solicitacoes=[], itensPorSol={}, filtroLoja=null, filtroStatus='enviada', solSelecionada=null;

async function req(path,method='GET',body=null){
  const opts={method,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(SUPABASE_URL+path,opts);
  if(!r.ok) throw new Error(await r.text());
  const t=await r.text(); return t?JSON.parse(t):[];
}

async function carregarTudo(){
  try{
    solicitacoes=await req('/rest/v1/compras_solicitacoes?order=criado_em.desc&limit=60');
    itensPorSol={};
    if(solicitacoes.length>0){
      const ids=solicitacoes.map(s=>s.id).join(',');
      const itens=await req(`/rest/v1/compras_itens?solicitacao_id=in.(${ids})&order=criado_em.asc`);
      for(const i of itens){ if(!itensPorSol[i.solicitacao_id]) itensPorSol[i.solicitacao_id]=[]; itensPorSol[i.solicitacao_id].push(i); }
    }
    atualizarTopbar(); atualizarContadores(); renderLista();
    if(solSelecionada){ const a=solicitacoes.find(s=>s.id===solSelecionada.id); if(a){solSelecionada=a;renderDetalhe();} }
  }catch(e){ toast('Erro ao carregar','err'); console.error(e); }
}

function atualizarTopbar(){
  const pendentes=solicitacoes.filter(s=>s.status==='enviada').length;
  const hoje=new Date().toDateString();
  const aprovHoje=solicitacoes.filter(s=>s.status==='aprovada'&&s.aprovado_em&&new Date(s.aprovado_em).toDateString()===hoje).length;
  const totalAprov=solicitacoes.filter(s=>s.status==='aprovada').reduce((sum,s)=>{
    return sum+(itensPorSol[s.id]||[]).reduce((si,i)=>i.status_item==='negado'?si:si+(i.preco_vendedor||0)*(i.qtd_aprovada||i.qtd_solicitada||0),0);
  },0);
  document.getElementById('stat-pendentes').textContent=pendentes;
  document.getElementById('stat-aprovadas').textContent=aprovHoje;
  document.getElementById('stat-total').textContent='R$ '+totalAprov.toLocaleString('pt-BR',{minimumFractionDigits:2});
}

function atualizarContadores(){
  const env=loja=>solicitacoes.filter(s=>s.status==='enviada'&&(!loja||s.loja===loja)).length;
  const set=(id,v)=>{const el=document.getElementById(id);if(el){el.textContent=v;el.className='nav-count'+(v===0?' zero':'');}};
  set('nc-todas',env(null)); set('nc-sf',env('Super Fênix')); set('nc-219',env('Fênix 219')); set('nc-nf',env('Nova Fênix')); set('nc-ac',env('Acácia'));
}

function filtrarLoja(loja,btn){
  filtroLoja=loja;
  document.querySelectorAll('.sidebar-left .nav-item').forEach(b=>{ if(!['fs-enviada','fs-aprovada','fs-todas'].includes(b.id)) b.classList.remove('active'); });
  if(btn) btn.classList.add('active');
  renderLista();
}

function filtrarStatus(status,btn){
  filtroStatus=status;
  ['fs-enviada','fs-aprovada','fs-todas'].forEach(id=>document.getElementById(id)?.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const t={enviada:'AGUARDANDO',aprovada:'APROVADAS',todas:'TODAS'};
  const s={enviada:'Solicitações dos gerentes',aprovada:'Prontas para compra',todas:'Histórico completo'};
  document.getElementById('list-titulo').textContent=t[status]||status.toUpperCase();
  document.getElementById('list-sub').textContent=s[status]||'';
  renderLista();
}

function renderLista(){
  let lista=solicitacoes;
  if(filtroLoja) lista=lista.filter(s=>s.loja===filtroLoja);
  if(filtroStatus!=='todas') lista=lista.filter(s=>s.status===filtroStatus);
  const el=document.getElementById('sol-list-body');
  if(lista.length===0){el.innerHTML='<div class="list-empty">Nenhuma solicitação.</div>';return;}
  el.innerHTML=lista.map(sol=>{
    const cor=LOJA_CORES[sol.loja]||'#666';
    const itens=itensPorSol[sol.id]||[];
    const aprovados=itens.filter(i=>i.status_item==='aprovado'||i.status_item==='ajustado').length;
    const pct=itens.length>0?Math.round(aprovados/itens.length*100):0;
    const d=new Date(sol.criado_em);
    const dataStr=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const isSelected=solSelecionada&&solSelecionada.id===sol.id;
    const pillCls=`pill pill-${sol.status}`;
    const pillTxt={enviada:'Aguardando',aprovada:'Aprovada',rascunho:'Rascunho'}[sol.status]||sol.status;
    return `<div class="sol-item ${isSelected?'selected':''}" style="--item-color:${cor}" onclick="selecionarSol(${sol.id})">
      <div class="sol-item-top">
        <div class="sol-item-loja"><div class="nav-dot" style="background:${cor}"></div>${sol.loja}</div>
        <div class="sol-item-id">#${sol.id}</div>
      </div>
      <div class="sol-item-meta">
        <div class="sol-item-data">${dataStr} · ${itens.length} prod</div>
        <span class="${pillCls}">${pillTxt}</span>
      </div>
      ${sol.status==='enviada'&&itens.length>0?`<div class="sol-item-progress"><div class="sol-item-progress-bar" style="width:${pct}%;background:${cor}"></div></div>`:''}
    </div>`;
  }).join('');
}

function selecionarSol(id){
  solSelecionada=solicitacoes.find(s=>s.id===id)||null;
  renderLista(); renderDetalhe();
}

function renderDetalhe(){
  const panel=document.getElementById('detail-panel');
  if(!solSelecionada){panel.innerHTML=`<div class="detail-empty"><div class="detail-empty-icon">←</div><div class="detail-empty-txt">Selecione uma solicitação<br>para ver os detalhes</div></div>`;return;}
  const sol=solSelecionada;
  const itens=itensPorSol[sol.id]||[];
  const cor=LOJA_CORES[sol.loja]||'#666';
  const d=new Date(sol.criado_em);
  const dataStr=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const totalSol=itens.reduce((s,i)=>s+(i.preco_vendedor||0)*(i.qtd_solicitada||0),0);
  const totalAprov=itens.reduce((s,i)=>i.status_item==='negado'?s:s+(i.preco_vendedor||0)*(i.qtd_aprovada||i.qtd_solicitada||0),0);
  const pendentes=itens.filter(i=>i.status_item==='pendente').length;
  const podeFinalizar=sol.status==='enviada'&&pendentes===0&&itens.length>0;
  const bloqueado=sol.status!=='enviada';

  panel.innerHTML=`
    <div class="detail-header">
      <div class="detail-loja-row">
        <div class="nav-dot" style="background:${cor};width:10px;height:10px"></div>
        <div class="detail-loja-nome">${sol.loja}</div>
      </div>
      <div class="detail-id">#${sol.id} · ${dataStr}</div>
      <div class="detail-meta">${itens.length} produto(s) · ${pendentes} pendente(s)</div>
    </div>
    <div class="detail-financeiro">
      <div class="fin-cell"><div class="fin-label">Solicitado</div><div class="fin-val">R$ ${totalSol.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
      <div class="fin-cell"><div class="fin-label">Aprovado</div><div class="fin-val green">R$ ${totalAprov.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
    </div>
    ${!bloqueado?`<div class="detail-actions">
      <button class="act-btn green-btn" onclick="aprovarTudo(${sol.id})">✓ Aprovar Tudo</button>
      <button class="act-btn orange-btn" onclick="finalizarAprovacao(${sol.id})" ${!podeFinalizar?'disabled':''}>Finalizar →</button>
    </div>`:`<div class="detail-actions"><span style="font-family:var(--mono);font-size:10px;color:var(--green)">✓ APROVADA — somente leitura</span></div>`}
    <div class="detail-items">
      ${itens.length===0?'<div class="list-empty">Nenhum produto.</div>':itens.map(i=>renderItemRow(i,bloqueado)).join('')}
    </div>
    <div class="detail-total">
      <div class="detail-total-row"><span>Total solicitado</span><span>R$ ${totalSol.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span></div>
      <div class="detail-total-row main"><span>Total aprovado</span><span>R$ ${totalAprov.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span></div>
    </div>`;
}

function renderItemRow(item,bloqueado){
  const cls=['aprovado','negado','ajustado'].includes(item.status_item)?item.status_item:'';
  const sbCls=`item-status-badge isb-${item.status_item||'pendente'}`;
  const sbTxt={pendente:'Pendente',aprovado:'Aprovado',negado:'Negado',ajustado:'Ajustado'}[item.status_item]||'Pendente';
  const totalItem=item.preco_vendedor?(item.preco_vendedor*item.qtd_solicitada).toLocaleString('pt-BR',{minimumFractionDigits:2}):'—';
  const qtdAprovVal=item.qtd_aprovada??item.qtd_solicitada;
  return `<div class="item-row ${cls}">
    <div class="item-row-top">
      <div><div class="item-nome">${item.produto}</div><div class="item-cat-tag">${item.categoria}</div></div>
      <span class="${sbCls}">${sbTxt}</span>
    </div>
    ${item.fornecedor?`<div class="item-fornecedor">↳ ${item.fornecedor}</div>`:''}
    <div class="item-row-nums">
      <div><div class="num-label">Estoque</div><div class="num-val stock">${item.estoque_atual??'—'}</div></div>
      <div><div class="num-label">Pedido</div><div class="num-val">${item.qtd_solicitada}</div></div>
      <div><div class="num-label">Preço</div><div class="num-val price">${item.preco_vendedor?'R$'+Number(item.preco_vendedor).toLocaleString('pt-BR',{minimumFractionDigits:2}):'—'}</div></div>
      <div><div class="num-label">Total</div><div class="num-val">R$${totalItem}</div></div>
    </div>
    <div class="item-row-actions">
      ${!bloqueado?`
        <span style="font-family:var(--mono);font-size:9px;color:var(--muted)">Aprov:</span>
        <input class="qtd-aprov-input" type="number" min="0" value="${qtdAprovVal}" id="qa-${item.id}">
        <button class="micro-btn aprov ${['aprovado','ajustado'].includes(item.status_item)?'on':''}" onclick="setStatus(${item.id},${item.solicitacao_id},'aprovar')">✓ Aprov</button>
        <button class="micro-btn negar ${item.status_item==='negado'?'on':''}" onclick="setStatus(${item.id},${item.solicitacao_id},'negar')">✕ Negar</button>
      `:`<span style="font-family:var(--mono);font-size:10px;color:var(--muted)">Qtd aprovada: ${qtdAprovVal}</span>`}
    </div>
  </div>`;
}

async function setStatus(itemId,solId,acao){
  const qtdInput=document.getElementById(`qa-${itemId}`);
  const qtdAprov=qtdInput?Number(qtdInput.value):null;
  const item=findItem(itemId);
  if(!item) return;
  const novoStatus=acao==='negar'?'negado':(qtdAprov!==null&&qtdAprov!==item.qtd_solicitada?'ajustado':'aprovado');
  try{
    await req(`/rest/v1/compras_itens?id=eq.${itemId}`,'PATCH',{status_item:novoStatus,qtd_aprovada:acao==='negar'?0:qtdAprov});
    item.status_item=novoStatus; item.qtd_aprovada=acao==='negar'?0:qtdAprov;
    renderDetalhe();
    toast(acao==='negar'?'Item negado.':'✓ Aprovado!',acao==='negar'?'err':'ok');
  }catch(e){toast('Erro ao salvar.','err');}
}

async function aprovarTudo(solId){
  const itens=(itensPorSol[solId]||[]).filter(i=>i.status_item==='pendente');
  if(itens.length===0){toast('Nenhum item pendente.');return;}
  try{
    for(const item of itens){
      const qtdInput=document.getElementById(`qa-${item.id}`);
      const qtd=qtdInput?Number(qtdInput.value):item.qtd_solicitada;
      await req(`/rest/v1/compras_itens?id=eq.${item.id}`,'PATCH',{status_item:'aprovado',qtd_aprovada:qtd});
      item.status_item='aprovado'; item.qtd_aprovada=qtd;
    }
    renderDetalhe(); toast(`✓ ${itens.length} itens aprovados!`,'ok');
  }catch(e){toast('Erro.','err');}
}

async function finalizarAprovacao(solId){
  if(!confirm('Finalizar aprovação?')) return;
  try{
    await req(`/rest/v1/compras_solicitacoes?id=eq.${solId}`,'PATCH',{status:'aprovada',aprovado_em:new Date().toISOString()});
    const sol=solicitacoes.find(s=>s.id===solId);
    if(sol) sol.status='aprovada';
    solSelecionada=sol;
    atualizarTopbar(); atualizarContadores(); renderLista(); renderDetalhe();
    toast('✓ Solicitação finalizada!','ok');
  }catch(e){toast('Erro.','err');}
}

function findItem(itemId){
  for(const sid in itensPorSol){ const i=itensPorSol[sid].find(x=>x.id===itemId); if(i) return i; }
  return null;
}

function toast(msg,tipo=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show '+tipo;
  setTimeout(()=>el.className='toast',2600);
}

function tick(){
  const el=document.getElementById('topbar-time');
  if(el) el.textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

carregarTudo();
setInterval(carregarTudo,30000);
setInterval(tick,1000);
tick();
</script>
</body>
</html>
