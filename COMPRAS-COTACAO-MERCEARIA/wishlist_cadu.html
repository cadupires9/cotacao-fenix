<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Wish List · Cadu</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Figtree:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#111210;--surface:#161816;--surface2:#1e201e;--surface3:#252725;
  --border:#2e302e;--border2:#3a3c3a;
  --text:#e8e6e0;--muted:#606060;--muted2:#404040;
  --orange:#e07b2a;--orange-dim:rgba(224,123,42,.10);
  --green:#4a9e6e;--green-dim:rgba(74,158,110,.12);
  --red:#c44030;--red-dim:rgba(196,64,48,.10);
  --yellow:#c8960a;--yellow-dim:rgba(200,150,10,.12);
  --blue:#4a7ec4;
  --font:'Figtree',sans-serif;--display:'Bebas Neue',sans-serif;--mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;display:flex;flex-direction:column;}

.topbar{height:50px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:18px;flex-shrink:0;}
.topbar-logo{font-family:var(--display);font-size:21px;letter-spacing:.04em;}
.topbar-logo em{color:var(--orange);font-style:normal;}
.tdiv{width:1px;height:22px;background:var(--border);}
.tstat{display:flex;flex-direction:column;gap:1px;}
.tstat-label{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.tstat-val{font-family:var(--mono);font-size:13px;}
.tstat-val.orange{color:var(--orange);}
.tstat-val.green{color:var(--green);}
.tsp{flex:1;}
.tbtn{background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:0 13px;height:30px;border-radius:5px;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:5px;}
.tbtn:hover{border-color:var(--orange);color:var(--orange);}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--orange);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

.workspace{flex:1;display:grid;grid-template-columns:190px 1fr 340px;overflow:hidden;}

/* SIDEBAR */
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;}
.s-label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:0 15px;margin-bottom:6px;}
.nav-btn{width:100%;background:none;border:none;color:var(--muted);padding:8px 15px;text-align:left;cursor:pointer;font-family:var(--font);font-size:13px;display:flex;align-items:center;gap:8px;transition:all .1s;border-left:2px solid transparent;}
.nav-btn:hover{color:var(--text);background:var(--surface2);}
.nav-btn.active{color:var(--text);background:var(--orange-dim);border-left-color:var(--nav-c,var(--orange));}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.nav-count{margin-left:auto;font-family:var(--mono);font-size:10px;background:var(--surface3);color:var(--orange);padding:1px 6px;border-radius:3px;min-width:20px;text-align:center;}
.nav-count.z{color:var(--muted);}
.sdiv{border:none;border-top:1px solid var(--border);margin:8px 0;}

/* LISTA MEIO */
.mid-panel{overflow-y:auto;border-right:1px solid var(--border);background:var(--bg);}
.mid-header{padding:13px 16px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10;}
.mid-title{font-family:var(--display);font-size:18px;letter-spacing:.03em;line-height:1;}
.mid-sub{font-size:11px;color:var(--muted);margin-top:2px;}

.lista-item{padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;position:relative;}
.lista-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--item-c,transparent);opacity:0;transition:opacity .15s;}
.lista-item:hover{background:var(--surface);}
.lista-item:hover::before{opacity:.6;}
.lista-item.sel{background:var(--surface2);}
.lista-item.sel::before{opacity:1;}
.li-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;}
.li-loja{display:flex;align-items:center;gap:7px;font-weight:600;font-size:14px;}
.li-id{font-family:var(--mono);font-size:10px;color:var(--muted);}
.li-meta{display:flex;justify-content:space-between;align-items:center;}
.li-data{font-size:11px;color:var(--muted);font-family:var(--mono);}
.pill{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.05em;padding:2px 7px;border-radius:3px;}
.pill-rascunho{background:var(--surface3);color:var(--muted);}
.pill-aguardando_aprovacao{background:rgba(200,150,10,.15);color:var(--yellow);}
.pill-aprovada{background:var(--green-dim);color:var(--green);}
.pill-enviada{background:rgba(74,126,196,.15);color:var(--blue);}
.pill-encerrada{background:var(--surface3);color:var(--muted);}
.li-progress{margin-top:8px;height:2px;background:var(--surface3);border-radius:1px;overflow:hidden;}
.li-progress-bar{height:100%;border-radius:1px;transition:width .3s;}

/* DETALHE DIREITO */
.detail{background:var(--surface);overflow-y:auto;display:flex;flex-direction:column;}
.detail-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:12px;padding:40px;text-align:center;font-size:12px;}

.dh{padding:15px 17px 13px;border-bottom:1px solid var(--border);flex-shrink:0;}
.dh-loja{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.dh-loja-nome{font-family:var(--display);font-size:19px;letter-spacing:.03em;line-height:1;}
.dh-id{font-family:var(--mono);font-size:10px;color:var(--muted);}
.dh-meta{font-size:11px;color:var(--muted);margin-top:3px;}

/* ABAS */
.forn-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;background:var(--surface2);}
.forn-tab{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.05em;padding:9px 13px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .12s;background:none;border-top:none;border-left:none;border-right:none;display:flex;align-items:center;gap:5px;}
.forn-tab:hover{color:var(--text);}
.forn-tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.tab-dot{width:6px;height:6px;border-radius:50%;}
.tab-badge{background:var(--orange);color:#000;border-radius:3px;padding:0 5px;font-size:9px;}

/* TABELA COMPARATIVA */
.comp-tab-btn{
  width:100%;background:var(--surface2);border:none;border-bottom:1px solid var(--border);
  color:var(--muted);padding:9px 16px;text-align:left;cursor:pointer;
  font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.07em;
  display:flex;align-items:center;justify-content:space-between;transition:color .12s;
  flex-shrink:0;
}
.comp-tab-btn:hover{color:var(--text);}
.comp-tab-btn.open{color:var(--orange);}

.comp-panel{display:none;flex-shrink:0;border-bottom:1px solid var(--border);overflow-x:auto;}
.comp-panel.open{display:block;}
.comp-table{width:100%;border-collapse:collapse;font-size:11px;}
.comp-table th{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:7px 10px;text-align:left;background:var(--surface3);border-bottom:1px solid var(--border);white-space:nowrap;}
.comp-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap;}
.comp-table tr:hover td{background:var(--surface2);}
.comp-prod{font-weight:600;font-size:12px;}
.comp-cat{font-family:var(--mono);font-size:9px;color:var(--orange);text-transform:uppercase;}
.price-cell{font-family:var(--mono);font-size:12px;}
.price-best{color:var(--green);font-weight:700;}
.price-worst{color:var(--muted);}
.price-mid{color:var(--text);}
.price-none{color:var(--muted2);font-style:italic;}
.crown{font-size:10px;margin-left:3px;}

/* ITEMS */
.detail-items{flex:1;overflow-y:auto;}
.cot-item{padding:11px 16px;border-bottom:1px solid var(--border);transition:background .1s;}
.cot-item:hover{background:var(--surface2);}
.cot-item.apr{border-left:2px solid var(--green);}
.cot-item.neg{border-left:2px solid var(--red);opacity:.55;}
.cot-item.ajust{border-left:2px solid var(--yellow);}
.ci-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;}
.ci-nome{font-weight:600;font-size:13px;}
.ci-cat{font-family:var(--mono);font-size:9px;color:var(--orange);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}
.sbadge{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.05em;padding:3px 7px;border-radius:3px;}
.sb-p{background:var(--surface3);color:var(--muted);}
.sb-a{background:var(--green-dim);color:var(--green);}
.sb-n{background:var(--red-dim);color:var(--red);}
.sb-j{background:var(--yellow-dim);color:var(--yellow);}
.ci-nums{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;}
.cn-label{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.cn-val{font-family:var(--mono);font-size:12px;}
.cn-val.price{color:var(--orange);}
.cn-val.price.best{color:var(--green);}
.cn-val.muted{color:var(--muted);}
.ci-obs{font-size:11px;color:var(--muted);margin-bottom:8px;font-style:italic;}
.ci-actions{display:flex;gap:6px;align-items:center;}
.qa-input{background:var(--surface3);border:1px solid var(--border2);color:var(--text);padding:5px 8px;border-radius:4px;font-family:var(--mono);font-size:12px;width:64px;text-align:center;outline:none;transition:border-color .12s;}
.qa-input:focus{border-color:var(--orange);}
.mbtn{background:none;border:1px solid var(--border2);color:var(--muted);padding:5px 10px;border-radius:4px;font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .12s;white-space:nowrap;}
.mbtn.apr{border-color:rgba(74,158,110,.35);color:var(--green);}
.mbtn.apr:hover,.mbtn.apr.on{background:var(--green-dim);border-color:var(--green);}
.mbtn.neg{border-color:rgba(196,64,48,.3);color:var(--red);}
.mbtn.neg:hover,.mbtn.neg.on{background:var(--red-dim);border-color:var(--red);}

.detail-actions{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.act-btn{flex:1;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:8px 0;border-radius:5px;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;transition:all .12s;}
.act-btn.green{border-color:rgba(74,158,110,.4);color:var(--green);}
.act-btn.green:hover{background:var(--green-dim);border-color:var(--green);}
.act-btn.orange{background:var(--orange);border-color:var(--orange);color:#000;}
.act-btn.orange:hover{opacity:.85;}
.act-btn:disabled{opacity:.35;cursor:not-allowed;}
.act-btn.wa{background:rgba(37,211,102,.15);border-color:rgba(37,211,102,.4);color:#25d366;}
.act-btn.wa:hover{background:rgba(37,211,102,.25);}

.aprov-needed{background:rgba(200,150,10,.12);border:1px solid rgba(200,150,10,.3);border-radius:6px;padding:9px 14px;margin:12px 16px;font-size:12px;color:var(--yellow);display:flex;align-items:center;gap:8px;flex-shrink:0;}

.detail-total{padding:11px 16px;border-top:1px solid var(--border);background:var(--surface2);flex-shrink:0;}
.dt-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:3px;}
.dt-row.main{font-size:14px;color:var(--orange);}

.list-empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:12px;}

/* MODAL WA */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px 32px;width:560px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:mIn .2s ease;}
@keyframes mIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.modal-title{font-family:var(--display);font-size:22px;letter-spacing:.03em;margin-bottom:6px;}
.modal-title em{color:#25d366;font-style:normal;}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.5;}
.wa-preview{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;font-family:var(--mono);font-size:12px;white-space:pre-wrap;word-break:break-word;max-height:300px;overflow-y:auto;line-height:1.6;color:var(--text);margin-bottom:16px;}
.modal-actions{display:flex;gap:10px;}
.mbtn-modal{flex:1;padding:11px;border-radius:7px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;border:none;transition:opacity .12s;}
.mbtn-modal.copy{background:var(--surface3);color:var(--text);border:1px solid var(--border2);}
.mbtn-modal.copy:hover{border-color:var(--border2);background:var(--surface2);}
.mbtn-modal.wa{background:#25d366;color:#000;}
.mbtn-modal.wa:hover{opacity:.88;}
.mbtn-modal.close{background:none;border:1px solid var(--border2);color:var(--muted);flex:none;padding:11px 18px;}

.toast{position:fixed;bottom:20px;right:24px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:6px;font-family:var(--mono);font-size:11px;z-index:999;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">WISH LIST <em>COMPRAS</em></div>
  <div class="tdiv"></div>
  <div class="tstat"><div class="tstat-label">P/ Aprovar</div><div class="tstat-val orange" id="stat-aprov">—</div></div>
  <div class="tstat"><div class="tstat-label">Cotações Recebidas</div><div class="tstat-val green" id="stat-cot">—</div></div>
  <div class="tsp"></div>
  <button class="tbtn" onclick="carregarTudo()"><div class="pulse"></div> Atualizar</button>
</div>

<div class="workspace">
  <nav class="sidebar">
    <div style="margin-bottom:18px">
      <div class="s-label">Lojas</div>
      <button class="nav-btn active" style="--nav-c:var(--orange)" onclick="filtrarLoja(null,this)">
        <div class="nav-dot" style="background:var(--muted)"></div>Todas<span class="nav-count" id="nc-todas">0</span>
      </button>
      <button class="nav-btn" style="--nav-c:#e07b2a" onclick="filtrarLoja('Super Fênix',this)">
        <div class="nav-dot" style="background:#e07b2a"></div>Super Fênix<span class="nav-count" id="nc-sf">0</span>
      </button>
      <button class="nav-btn" style="--nav-c:#c8960a" onclick="filtrarLoja('Fênix 219',this)">
        <div class="nav-dot" style="background:#c8960a"></div>Fênix 219<span class="nav-count" id="nc-219">0</span>
      </button>
      <button class="nav-btn" style="--nav-c:#4a9e6e" onclick="filtrarLoja('Nova Fênix',this)">
        <div class="nav-dot" style="background:#4a9e6e"></div>Nova Fênix<span class="nav-count" id="nc-nf">0</span>
      </button>
      <button class="nav-btn" style="--nav-c:#4a7ec4" onclick="filtrarLoja('Acácia',this)">
        <div class="nav-dot" style="background:#4a7ec4"></div>Acácia<span class="nav-count" id="nc-ac">0</span>
      </button>
    </div>
    <hr class="sdiv">
    <div>
      <div class="s-label">Status</div>
      <button class="nav-btn active" id="fs-aprov" style="--nav-c:var(--yellow)" onclick="filtrarStatus('aguardando_aprovacao',this)">
        <div class="nav-dot" style="background:var(--yellow)"></div>Aguard. Aprovação
      </button>
      <button class="nav-btn" id="fs-env" style="--nav-c:var(--blue)" onclick="filtrarStatus('enviada',this)">
        <div class="nav-dot" style="background:var(--blue)"></div>Enviadas
      </button>
      <button class="nav-btn" id="fs-enc" style="--nav-c:var(--green)" onclick="filtrarStatus('encerrada',this)">
        <div class="nav-dot" style="background:var(--green)"></div>Encerradas
      </button>
      <button class="nav-btn" id="fs-all" style="--nav-c:var(--muted)" onclick="filtrarStatus('todas',this)">
        <div class="nav-dot" style="background:var(--muted)"></div>Todas
      </button>
    </div>
  </nav>

  <div class="mid-panel">
    <div class="mid-header">
      <div>
        <div class="mid-title" id="mid-title">AGUARD. APROVAÇÃO</div>
        <div class="mid-sub" id="mid-sub">Listas enviadas pelos gerentes</div>
      </div>
    </div>
    <div id="mid-body"><div class="list-empty">Carregando...</div></div>
  </div>

  <div class="detail" id="detail">
    <div class="detail-empty"><div style="font-size:32px;opacity:.4">←</div><div>Selecione uma lista</div></div>
  </div>
</div>

<!-- MODAL WHATSAPP -->
<div class="modal-overlay" id="modal-wa">
  <div class="modal">
    <div class="modal-title">Mensagem <em>WhatsApp</em></div>
    <div class="modal-sub" id="wa-sub">Pedido aprovado para envio ao fornecedor.</div>
    <div class="wa-preview" id="wa-preview"></div>
    <div class="modal-actions">
      <button class="mbtn-modal copy" onclick="copiarMensagem()">📋 Copiar</button>
      <button class="mbtn-modal wa" onclick="abrirWhatsApp()">📱 Abrir WhatsApp</button>
      <button class="mbtn-modal close" onclick="fecharModal()">Fechar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://ccdlreblkvgnidtwinkz.supabase.co';
const SUPABASE_KEY='sb_publishable_fUFSIIZ0L8BXehhezAFQ6A_fsQ0b9pv';
const LOJA_CORES={'Super Fênix':'#e07b2a','Fênix 219':'#c8960a','Nova Fênix':'#4a9e6e','Acácia':'#4a7ec4'};

let listas=[],itensPorLista={},cotacoesPorLista={},respostasPorCot={};
let filtroLoja=null,filtroStatus='aguardando_aprovacao',listaSel=null,fornTabSel={};
let waMsgAtual='',waContatoAtual='';
let compAberto=false;

async function req(path,method='GET',body=null){
  const opts={method,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(SUPABASE_URL+path,opts);
  if(!r.ok) throw new Error(await r.text());
  const t=await r.text(); return t?JSON.parse(t):[];
}

async function carregarTudo(){
  try{
    listas=await req('/rest/v1/wishlist_listas?order=criado_em.desc&limit=60');
    itensPorLista={};cotacoesPorLista={};respostasPorCot={};
    if(listas.length>0){
      const ids=listas.map(l=>l.id).join(',');
      const itens=await req(`/rest/v1/wishlist_itens?lista_id=in.(${ids})&order=criado_em.asc`);
      for(const i of itens){if(!itensPorLista[i.lista_id])itensPorLista[i.lista_id]=[];itensPorLista[i.lista_id].push(i);}
      const cots=await req(`/rest/v1/wishlist_cotacoes?lista_id=in.(${ids})&order=criado_em.asc`);
      for(const c of cots){if(!cotacoesPorLista[c.lista_id])cotacoesPorLista[c.lista_id]=[];cotacoesPorLista[c.lista_id].push(c);}
      if(cots.length>0){
        const cids=cots.map(c=>c.id).join(',');
        const resps=await req(`/rest/v1/wishlist_respostas?cotacao_id=in.(${cids})&order=criado_em.asc`);
        for(const r of resps){if(!respostasPorCot[r.cotacao_id])respostasPorCot[r.cotacao_id]=[];respostasPorCot[r.cotacao_id].push(r);}
      }
    }
    atualizarTopbar();atualizarContadores();renderLista();
    if(listaSel){const a=listas.find(l=>l.id===listaSel.id);if(a){listaSel=a;renderDetalhe();}}
  }catch(e){toast('Erro ao carregar','err');console.error(e);}
}

function atualizarTopbar(){
  document.getElementById('stat-aprov').textContent=listas.filter(l=>l.status==='aguardando_aprovacao').length;
  document.getElementById('stat-cot').textContent=Object.values(cotacoesPorLista).flat().filter(c=>c.status==='respondida').length;
}
function atualizarContadores(){
  const c=loja=>listas.filter(l=>l.status==='aguardando_aprovacao'&&(!loja||l.loja===loja)).length;
  const s=(id,v)=>{const el=document.getElementById(id);if(el){el.textContent=v;el.className='nav-count'+(v===0?' z':'');}};
  s('nc-todas',c(null));s('nc-sf',c('Super Fênix'));s('nc-219',c('Fênix 219'));s('nc-nf',c('Nova Fênix'));s('nc-ac',c('Acácia'));
}

function filtrarLoja(loja,btn){
  filtroLoja=loja;
  document.querySelectorAll('.sidebar .nav-btn').forEach(b=>{if(!['fs-aprov','fs-env','fs-enc','fs-all'].includes(b.id))b.classList.remove('active');});
  if(btn)btn.classList.add('active');renderLista();
}
function filtrarStatus(st,btn){
  filtroStatus=st;
  ['fs-aprov','fs-env','fs-enc','fs-all'].forEach(id=>document.getElementById(id)?.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const t={aguardando_aprovacao:'AGUARD. APROVAÇÃO',enviada:'ENVIADAS',encerrada:'ENCERRADAS',todas:'TODAS'};
  const s={aguardando_aprovacao:'Listas para aprovar',enviada:'Aguardando fornecedores',encerrada:'Finalizadas',todas:'Histórico'};
  document.getElementById('mid-title').textContent=t[st]||st.toUpperCase();
  document.getElementById('mid-sub').textContent=s[st]||'';
  renderLista();
}

function renderLista(){
  let lista=listas;
  if(filtroLoja)lista=lista.filter(l=>l.loja===filtroLoja);
  if(filtroStatus!=='todas')lista=lista.filter(l=>l.status===filtroStatus);
  const el=document.getElementById('mid-body');
  if(lista.length===0){el.innerHTML='<div class="list-empty">Nenhuma lista.</div>';return;}
  el.innerHTML=lista.map(l=>{
    const cor=LOJA_CORES[l.loja]||'#666';
    const itens=itensPorLista[l.id]||[];
    const cots=cotacoesPorLista[l.id]||[];
    const resp=cots.filter(c=>c.status==='respondida').length;
    const d=new Date(l.criado_em);
    const ds=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const isSel=listaSel&&listaSel.id===l.id;
    const pillTxt={rascunho:'Rascunho',aguardando_aprovacao:'Aguardando',aprovada:'Aprovada',enviada:'Enviada',encerrada:'Encerrada'}[l.status]||l.status;
    return `<div class="lista-item ${isSel?'sel':''}" style="--item-c:${cor}" onclick="selecionarLista(${l.id})">
      <div class="li-top"><div class="li-loja"><div class="nav-dot" style="background:${cor}"></div>${l.loja}</div><div class="li-id">#${l.id}</div></div>
      <div class="li-meta"><div class="li-data">${ds} · ${itens.length} item(s)${cots.length>0?` · ${resp}/${cots.length} resp`:''}</div><span class="pill pill-${l.status}">${pillTxt}</span></div>
      ${cots.length>0?`<div class="li-progress"><div class="li-progress-bar" style="width:${Math.round(resp/cots.length*100)}%;background:${cor}"></div></div>`:''}
    </div>`;
  }).join('');
}

function selecionarLista(id){listaSel=listas.find(l=>l.id===id)||null;renderLista();renderDetalhe();}

// Calcula menor preço por item entre todos os fornecedores
function calcMenoresPrecos(listaId){
  const cots=cotacoesPorLista[listaId]||[];
  const menores={};
  for(const cot of cots){
    const resps=respostasPorCot[cot.id]||[];
    for(const r of resps){
      if(r.preco_ofertado&&r.qtd_disponivel>0){
        if(!menores[r.item_id]||r.preco_ofertado<menores[r.item_id])
          menores[r.item_id]=r.preco_ofertado;
      }
    }
  }
  return menores;
}

function renderDetalhe(){
  const panel=document.getElementById('detail');
  if(!listaSel){panel.innerHTML='<div class="detail-empty"><div style="font-size:32px;opacity:.4">←</div><div>Selecione uma lista</div></div>';return;}
  const l=listaSel;
  const cor=LOJA_CORES[l.loja]||'#666';
  const d=new Date(l.criado_em);
  const ds=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const itens=itensPorLista[l.id]||[];
  const cots=cotacoesPorLista[l.id]||[];
  const precisaAprovacao=l.status==='aguardando_aprovacao';
  if(!fornTabSel[l.id]&&cots.length>0)fornTabSel[l.id]=cots[0].id;
  const menores=calcMenoresPrecos(l.id);

  let tabsHtml='';
  let bodyHtml='';

  if(!cots.length){
    bodyHtml=`<div style="padding:16px">${itens.map(i=>`<div style="padding:10px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between">
      <div><div style="font-weight:600;font-size:13px">${i.produto}</div><div style="font-family:var(--mono);font-size:9px;color:var(--orange);text-transform:uppercase;margin-top:2px">${i.categoria}</div></div>
      <div style="font-family:var(--mono);font-size:12px;color:var(--muted)">Qtd: ${i.qtd_desejada}</div>
    </div>`).join('')}</div>`;
  } else {
    // Tabela comparativa
    const compHtml=buildComparativo(itens,cots,menores);

    const cotAtiva=cots.find(c=>c.id===fornTabSel[l.id])||cots[0];
    tabsHtml=`<button class="comp-tab-btn ${compAberto?'open':''}" onclick="toggleComp(this)">
      📊 Comparativo de Preços ${cots.filter(c=>c.status==='respondida').length}/${cots.length} respondido(s) <span style="float:right">${compAberto?'▲':'▼'}</span>
    </button>
    <div class="comp-panel ${compAberto?'open':''}" id="comp-panel">${compHtml}</div>
    <div class="forn-tabs">${cots.map(c=>{
      const resps=respostasPorCot[c.id]||[];
      const pendentes=resps.filter(r=>r.status_aprovacao==='pendente'&&r.preco_ofertado).length;
      const dotCor=c.status==='respondida'?'var(--green)':'var(--muted)';
      return `<button class="forn-tab ${c.id===cotAtiva.id?'active':''}" onclick="selecionarFornTab(${l.id},${c.id})">
        <span class="tab-dot" style="background:${dotCor}"></span>
        ${c.fornecedor_nome}
        ${pendentes>0?`<span class="tab-badge">${pendentes}</span>`:''}
      </button>`;
    }).join('')}</div>`;

    const resps=respostasPorCot[cotAtiva.id]||[];
    const totalAprov=resps.reduce((s,r)=>r.status_aprovacao==='negado'||!r.preco_ofertado?s:s+(r.preco_ofertado)*(r.qtd_aprovada||0),0);
    const pendentes=resps.filter(r=>r.status_aprovacao==='pendente'&&r.preco_ofertado).length;
    const podeFinalizar=cotAtiva.status==='respondida'&&pendentes===0&&resps.length>0;
    const encerrada=l.status==='encerrada';

    const itensAprov=resps.filter(r=>['aprovado','ajustado'].includes(r.status_aprovacao)&&r.preco_ofertado);

    bodyHtml=`
      ${pendentes>0?`<div class="aprov-needed">⚠ ${pendentes} item(s) aguardando decisão</div>`:''}
      ${!encerrada?`<div class="detail-actions">
        <button class="act-btn green" onclick="aprovarTudoForn(${cotAtiva.id})">✓ Aprovar Tudo</button>
        ${itensAprov.length>0?`<button class="act-btn wa" onclick="abrirModalWA(${l.id},${cotAtiva.id})">📱 WhatsApp</button>`:''}
        <button class="act-btn orange" onclick="finalizarCotacao(${l.id})" ${!podeFinalizar?'disabled':''}>Finalizar →</button>
      </div>`:''}
      <div class="detail-items">
        ${itens.map(item=>{
          const resp=resps.find(r=>r.item_id===item.id);
          if(!resp)return `<div class="cot-item"><div class="ci-top"><div><div class="ci-nome">${item.produto}</div><div class="ci-cat">${item.categoria}</div></div><span class="sbadge sb-p">Sem resposta</span></div></div>`;
          const naoTem=resp.qtd_disponivel===0&&!resp.preco_ofertado;
          if(naoTem)return `<div class="cot-item neg"><div class="ci-top"><div><div class="ci-nome">${item.produto}</div><div class="ci-cat">${item.categoria}</div></div><span class="sbadge sb-n">Não tem</span></div></div>`;
          const cls=resp.status_aprovacao==='aprovado'?'apr':resp.status_aprovacao==='negado'?'neg':resp.status_aprovacao==='ajustado'?'ajust':'';
          const sbCls={pendente:'sb-p',aprovado:'sb-a',negado:'sb-n',ajustado:'sb-j'}[resp.status_aprovacao]||'sb-p';
          const sbTxt={pendente:'Pendente',aprovado:'Aprovado',negado:'Negado',ajustado:'Ajustado'}[resp.status_aprovacao]||'Pendente';
          const qtdAprov=resp.qtd_aprovada??item.qtd_desejada;
          const isBest=menores[item.id]&&resp.preco_ofertado===menores[item.id];
          return `<div class="cot-item ${cls}">
            <div class="ci-top"><div><div class="ci-nome">${item.produto}${isBest?' <span style="font-size:11px">🏆</span>':''}</div><div class="ci-cat">${item.categoria}</div></div><span class="sbadge ${sbCls}">${sbTxt}</span></div>
            ${resp.observacao?`<div class="ci-obs">"${resp.observacao}"</div>`:''}
            <div class="ci-nums">
              <div><div class="cn-label">Solicitado</div><div class="cn-val muted">${item.qtd_desejada}</div></div>
              <div><div class="cn-label">Disponível</div><div class="cn-val">${resp.qtd_disponivel??'—'}</div></div>
              <div><div class="cn-label">Preço Unit.</div><div class="cn-val price ${isBest?'best':''}">R$ ${Number(resp.preco_ofertado).toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
              <div><div class="cn-label">Total</div><div class="cn-val">R$ ${(resp.preco_ofertado*(resp.qtd_disponivel||0)).toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
            </div>
            ${!encerrada?`<div class="ci-actions">
              <span style="font-family:var(--mono);font-size:9px;color:var(--muted)">Aprov:</span>
              <input class="qa-input" type="number" min="0" value="${qtdAprov}" id="qa-${resp.id}">
              <button class="mbtn apr ${['aprovado','ajustado'].includes(resp.status_aprovacao)?'on':''}" onclick="setRespStatus(${resp.id},${cotAtiva.id},'aprovar')">✓ Aprov</button>
              <button class="mbtn neg ${resp.status_aprovacao==='negado'?'on':''}" onclick="setRespStatus(${resp.id},${cotAtiva.id},'negar')">✕ Negar</button>
            </div>`:''}`
          ;
        }).join('')}
      </div>
      <div class="detail-total">
        <div class="dt-row main"><span>Total aprovado (${cotAtiva.fornecedor_nome})</span><span>R$ ${totalAprov.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span></div>
      </div>`;
  }

  panel.innerHTML=`
    <div class="dh">
      <div class="dh-loja"><div class="nav-dot" style="background:${cor};width:10px;height:10px"></div><div class="dh-loja-nome">${l.loja}</div></div>
      <div class="dh-id">#${l.id} · ${ds}</div>
      <div class="dh-meta">${itens.length} item(s) · ${cots.length} fornecedor(es)</div>
    </div>
    ${precisaAprovacao?`<div style="padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-shrink:0">
      <button class="act-btn green" onclick="aprovarLista(${l.id})">✓ Aprovar Lista</button>
      <button class="act-btn" style="color:var(--red);border-color:rgba(196,64,48,.3)" onclick="rejeitarLista(${l.id})">✕ Rejeitar</button>
    </div>`:''}
    ${tabsHtml}
    ${bodyHtml}`;
}

function buildComparativo(itens,cots,menores){
  const respondidas=cots.filter(c=>c.status==='respondida');
  if(respondidas.length===0) return '<div style="padding:14px 16px;font-size:12px;color:var(--muted)">Aguardando respostas dos fornecedores...</div>';

  const cols=respondidas.map(c=>c.fornecedor_nome);
  let html=`<table class="comp-table">
    <thead><tr>
      <th>Produto</th>
      <th>Qtd. Solic.</th>
      ${cols.map(n=>`<th>${n}</th>`).join('')}
      <th>Menor Preço</th>
    </tr></thead><tbody>`;

  for(const item of itens){
    const precos=respondidas.map(cot=>{
      const r=(respostasPorCot[cot.id]||[]).find(x=>x.item_id===item.id);
      return r?.preco_ofertado||null;
    });
    const precosValidos=precos.filter(p=>p!==null);
    const menor=precosValidos.length>0?Math.min(...precosValidos):null;

    html+=`<tr>
      <td><div class="comp-prod">${item.produto}</div><div class="comp-cat">${item.categoria}</div></td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--muted)">${item.qtd_desejada}</td>
      ${precos.map(p=>{
        if(p===null) return `<td><span class="price-none">—</span></td>`;
        const isBest=p===menor;
        const cls=isBest?'price-best':(precosValidos.length>1&&p===Math.max(...precosValidos)?'price-worst':'price-mid');
        return `<td><span class="price-cell ${cls}">R$ ${Number(p).toLocaleString('pt-BR',{minimumFractionDigits:2})}${isBest?'<span class="crown">👑</span>':''}</span></td>`;
      }).join('')}
      <td><span class="price-cell price-best">${menor?'R$ '+Number(menor).toLocaleString('pt-BR',{minimumFractionDigits:2}):'—'}</span></td>
    </tr>`;
  }
  html+='</tbody></table>';
  return html;
}

function toggleComp(btn){
  compAberto=!compAberto;
  btn.classList.toggle('open',compAberto);
  document.getElementById('comp-panel')?.classList.toggle('open',compAberto);
  btn.querySelector('span[style]').textContent=compAberto?'▲':'▼';
}

function selecionarFornTab(listaId,cotId){fornTabSel[listaId]=cotId;renderDetalhe();}

async function aprovarLista(listaId){
  try{
    await req(`/rest/v1/wishlist_listas?id=eq.${listaId}`,'PATCH',{status:'aprovada',aprovado_em:new Date().toISOString()});
    const l=listas.find(x=>x.id===listaId);if(l)l.status='aprovada';
    listaSel=l;atualizarTopbar();atualizarContadores();renderLista();renderDetalhe();
    toast('✓ Lista aprovada!','ok');
  }catch(e){toast('Erro: '+e.message,'err');}
}
async function rejeitarLista(listaId){
  if(!confirm('Rejeitar esta lista?')) return;
  try{
    await req(`/rest/v1/wishlist_listas?id=eq.${listaId}`,'PATCH',{status:'rascunho'});
    const l=listas.find(x=>x.id===listaId);if(l)l.status='rascunho';
    listaSel=l;atualizarContadores();renderLista();renderDetalhe();
  }catch(e){toast('Erro.','err');}
}

async function setRespStatus(respId,cotId,acao){
  const qtdInput=document.getElementById(`qa-${respId}`);
  const qtd=qtdInput?Number(qtdInput.value):null;
  const resp=findResp(respId);if(!resp)return;
  const novoStatus=acao==='negar'?'negado':(qtd!==null&&qtd!==resp.qtd_disponivel?'ajustado':'aprovado');
  try{
    await req(`/rest/v1/wishlist_respostas?id=eq.${respId}`,'PATCH',{status_aprovacao:novoStatus,qtd_aprovada:acao==='negar'?0:qtd});
    resp.status_aprovacao=novoStatus;resp.qtd_aprovada=acao==='negar'?0:qtd;
    renderDetalhe();
    toast(acao==='negar'?'Item negado.':'✓ Aprovado!',acao==='negar'?'err':'ok');
  }catch(e){toast('Erro.','err');}
}

async function aprovarTudoForn(cotId){
  const resps=Object.values(respostasPorCot).flat().filter(r=>r.cotacao_id===cotId&&r.status_aprovacao==='pendente'&&r.preco_ofertado);
  if(!resps.length){toast('Nenhum item pendente.');return;}
  try{
    for(const r of resps){
      const qtdInput=document.getElementById(`qa-${r.id}`);
      const qtd=qtdInput?Number(qtdInput.value):r.qtd_disponivel;
      await req(`/rest/v1/wishlist_respostas?id=eq.${r.id}`,'PATCH',{status_aprovacao:'aprovado',qtd_aprovada:qtd});
      r.status_aprovacao='aprovado';r.qtd_aprovada=qtd;
    }
    renderDetalhe();toast(`✓ ${resps.length} itens aprovados!`,'ok');
  }catch(e){toast('Erro.','err');}
}

async function finalizarCotacao(listaId){
  if(!confirm('Finalizar e encerrar esta lista?')) return;
  try{
    await req(`/rest/v1/wishlist_listas?id=eq.${listaId}`,'PATCH',{status:'encerrada',encerrado_em:new Date().toISOString()});
    const l=listas.find(x=>x.id===listaId);if(l)l.status='encerrada';
    listaSel=l;atualizarTopbar();atualizarContadores();renderLista();renderDetalhe();
    toast('✓ Lista encerrada!','ok');
  }catch(e){toast('Erro.','err');}
}

// WHATSAPP
function abrirModalWA(listaId,cotId){
  const l=listas.find(x=>x.id===listaId);
  const cot=Object.values(cotacoesPorLista).flat().find(c=>c.id===cotId);
  const itens=itensPorLista[listaId]||[];
  const resps=respostasPorCot[cotId]||[];
  const itensAprov=resps.filter(r=>['aprovado','ajustado'].includes(r.status_aprovacao)&&r.preco_ofertado);

  if(!itensAprov.length){toast('Nenhum item aprovado ainda.','err');return;}

  const data=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
  let msg=`*PEDIDO FÊNIX — ${l?.loja||''}*\n`;
  msg+=`📅 ${data}\n`;
  msg+=`👤 Fornecedor: ${cot?.fornecedor_nome||''}\n`;
  msg+=`─────────────────\n`;

  let total=0;
  for(const resp of itensAprov){
    const item=itens.find(i=>i.id===resp.item_id);
    const qtd=resp.qtd_aprovada||0;
    const preco=resp.preco_ofertado||0;
    const subtotal=qtd*preco;
    total+=subtotal;
    msg+=`\n📦 *${item?.produto||'Item'}*\n`;
    msg+=`   Qtd: ${qtd} un\n`;
    msg+=`   Preço unit.: R$ ${Number(preco).toLocaleString('pt-BR',{minimumFractionDigits:2})}\n`;
    msg+=`   Subtotal: R$ ${subtotal.toLocaleString('pt-BR',{minimumFractionDigits:2})}\n`;
  }
  msg+=`─────────────────\n`;
  msg+=`💰 *TOTAL GERAL: R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}*\n`;
  msg+=`\nAguardamos confirmação. Obrigado!`;

  waMsgAtual=msg;
  waContatoAtual=cot?.fornecedor_contato||'';

  document.getElementById('wa-sub').textContent=`${itensAprov.length} item(s) aprovado(s) para ${cot?.fornecedor_nome||'fornecedor'}`;
  document.getElementById('wa-preview').textContent=msg;
  document.getElementById('modal-wa').classList.add('open');
}

function copiarMensagem(){
  navigator.clipboard.writeText(waMsgAtual).then(()=>toast('✓ Copiado!','ok'));
}
function abrirWhatsApp(){
  const num=waContatoAtual.replace(/\D/g,'');
  const url=`https://wa.me/${num?'55'+num:''}?text=${encodeURIComponent(waMsgAtual)}`;
  window.open(url,'_blank');
}
function fecharModal(){document.getElementById('modal-wa').classList.remove('open');}
document.getElementById('modal-wa').addEventListener('click',e=>{if(e.target===document.getElementById('modal-wa'))fecharModal();});

function findResp(id){
  for(const cid in respostasPorCot){const r=respostasPorCot[cid].find(x=>x.id===id);if(r)return r;}
  return null;
}
function toast(msg,tipo=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show '+tipo;
  setTimeout(()=>el.className='toast',2600);
}

carregarTudo();
setInterval(carregarTudo,30000);
</script>
